<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Bussid</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.75)), 
                        url('https://picsum.photos/1920/1080?random=45') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            max-width: 460px;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            color: #333;
        }

        .header {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            text-align: center;
            padding: 35px 20px 30px;
        }

        .logo {
            width: 95px;
            height: 95px;
            background: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 4px solid white;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 6px;
        }

        .header p {
            opacity: 0.95;
            font-size: 15px;
        }

        .content {
            padding: 40px 30px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 20px;
            margin: 12px 0;
            border-radius: 50px;
            font-size: 17px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            width: 100%;
            color: white;
        }

        .wa-admin { background: #25D366; }
        .wa-group { background: #22C35E; }
        .donasi-btn { 
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        }
        .yt-btn { background: #FF0000; }

        .btn:hover {
            transform: translateY(-5px);
        }

        .icon {
            font-size: 26px;
        }

        .separator {
            margin: 25px 0;
            text-align: center;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <!-- GANTI DENGAN LOGO KAMU -->
                <img src="https://ibb.co/sprhZbJk" alt="Logo">
            </div>
            <h1>Halo! Selamat Datang</h1>
            <p>Silakan pilih menu yang Anda butuhkan</p>
        </div>

        <!-- Content -->
        <div class="content">

            <!-- Hubungi Admin WhatsApp -->
            <a href="https://wa.me/6287719930242?text=Halo%20Admin,%20saya%20mau%20bertanya" 
               target="_blank" 
               class="btn wa-admin">
                <i class="fab fa-whatsapp icon"></i>
                Hubungi Admin WhatsApp
            </a>

            <!-- Gabung Grup WhatsApp -->
            <a href="https://chat.whatsapp.com/F4SitLgG0jm6cl5sUfgP8e" 
               target="_blank" 
               class="btn wa-group">
                <i class="fab fa-whatsapp icon"></i>
                Gabung Grup WhatsApp
            </a>

            <!-- Donasi -->
            <a href="https://saweria.co/RifalModzYT" 
               target="_blank" 
               class="btn donasi-btn">
                <i class="fas fa-heart icon"></i>
                Dukung Kami / Donasi
            </a>

            <div class="separator">— ATAU —</div>

            <!-- Subscribe YouTube -->
            <a href="https://youtube.com/@rifalmodzyt?si=uLca1wQpHMNjWifa" 
               target="_blank" 
               class="btn yt-btn">
                <i class="fab fa-youtube icon"></i>
                Subscribe Channel YouTube
            </a>

            <p style="text-align: center; margin-top: 30px; color: #555; font-size: 14px;">
                Terima kasih telah mendukung kami ❤️
            </p>
        </div>
    </div>

</body>
</html>
