        /* Lingkaran Full RGB */
        .rainbow-circle {

            border-radius: 50%;
            background: linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff, #ff0000);
            background-size: 300% 300%;
            animation: rainbow-circle 4s linear infinite;
            box-shadow: 0 12px 35px rgba(0,0,0,0.45);
            position: relative;
        }

        /* Border putih tipis di luar untuk kontras */
        .rainbow-circle::before {
            content: '';
            position: absolute;
            top: -6px;
            left: -6px;
            right: -6px;
            bottom: -6px;
            border-radius: 50%;
            background: white;
            z-index: -1;
        }

        @keyframes rainbow-circle {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-text {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff);
            background-size: 400% 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbow 4s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rainbow-separator {
            margin: 35px 0;
            height: 3px;
            background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #00ffff, #0000ff, #8b00ff);

            animation: rainbow-line 6s linear infinite;
            border-radius: 50px;
        }

        @keyframes rainbow-line {

            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
